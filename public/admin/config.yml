backend:
  name: github
  repo: Sean-TEE/renatelubaev.kz
  branch: main
  # app_id: "ВСТАВЬТЕ_СЮДА_ВАШ_GITHUB_OAUTH_CLIENT_ID"

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "jury"
    label: "Жюри (Jury Members)"
    folder: "src/content/jury"
    create: true
    format: "json"
    slug: "{{name}}"
    identifier_field: "name"
    fields:
      - {label: "Name (Имя)", name: "name", widget: "string"}
      - {label: "Role (Роль)", name: "role", widget: "string"}
      - {label: "Title / Regalia (Регалии)", name: "title", widget: "string"}
      - {label: "Achievements", name: "achievements", widget: "list", field: {label: "Achievement", name: "achievement", widget: "string"}}
      - {label: "Biography (Биография)", name: "bio", widget: "markdown", required: false}
      - {label: "Location (Город/Страна)", name: "location", widget: "string"}
      - {label: "Photo (Фотография)", name: "image", widget: "image"}

  - name: "gallery"
    label: "Мои картины (Галерея)"
    folder: "src/content/gallery"
    create: true
    format: "json"
    identifier_field: "title"
    slug: "{{year}}-{{title}}"
    fields:
      - {label: "Название произведения", name: "title", widget: "string"}
      - {label: "Год создания", name: "year", widget: "string", required: false}
      - {label: "Описание (Размер, Холст, Масло...)", name: "description", widget: "string", required: false}
      - {label: "Фотография", name: "image", widget: "image"}

  - name: "custom_pages"
    label: "Дополнительные страницы"
    folder: "src/content/custom_pages"
    create: true
    format: "frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields:
      - {label: "Служебная ссылка (Slug - латиницей, без пробелов. Напр: my-new-page)", name: "slug", widget: "string"}
      - {label: "Заголовок страницы", name: "title", widget: "string"}
      - {label: "Описание (Для SEO)", name: "description", widget: "string", required: false}
      - {label: "Содержимое", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Главные страницы (Статичные)"
    files:
      - file: "src/content/pages/home.json"
        label: "Главная (Home)"
        name: "home"
        fields:
          - {label: "Заголовок (Eyebrow)", name: "heroEyebrow", widget: "string"}
          - {label: "Главный заголовок", name: "heroTitle", widget: "string"}
          - {label: "Подзаголовок", name: "heroSubtitle", widget: "string"}

      - file: "src/content/pages/about.json"
        label: "О художнике (About)"
        name: "about"
        fields:
          - {label: "Первый абзац (Вводный)", name: "bioLead", widget: "text"}
          - {label: "Второй абзац", name: "bioText1", widget: "text"}
          - {label: "Третий абзац", name: "bioText2", widget: "text"}

      - file: "src/content/pages/competition.json"
        label: "Конкурс (Competition)"
        name: "competition"
        fields:
          - {label: "Статус (opened/closed)", name: "status", widget: "string"}
          - {label: "Вводный текст", name: "introText", widget: "text"}
          - {label: "Информация о датах издания", name: "currentEditionInfo", widget: "string"}
          - {label: "Количество оцененных работ", name: "statsEvaluated", widget: "string"}
          - {label: "Формат проведения", name: "statsFormat", widget: "string"}

      - file: "src/content/settings/global.json"
        label: "Настройки сайта (Контакты)"
        name: "settings"
        fields:
          - {label: "Formspree ID (Форма контактов)", name: "formspreeId", widget: "string"}
          - {label: "Номер телефона", name: "contactPhone", widget: "string"}
          - {label: "Контактный Email", name: "contactEmail", widget: "string"}
          - {label: "Адрес", name: "contactAddress", widget: "string"}
